name: Lines Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  lines-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: myst-blazeio
          template: classic
          filename: assets/metrics.lines.svg
          config_timezone: Asia/Kolkata
          base: ""
          plugin_lines: yes
          plugin_followup: yes
          plugin_followup_indepth: yes
