name: Lines Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  lines-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Lines Metrics (Dark)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: myst-blazeio
          template: classic
          filename: assets/metrics.lines.dark.svg
          config_timezone: Asia/Kolkata
          base: ""
          plugin_lines: yes
          plugin_followup: yes
          plugin_followup_indepth: yes
          # Dark: Blue accent on Black background
          colors: '{"accent": "#00BFFF", "header": "#ffffff", "text": "#c9d1d9", "background": "#0d1117"}'

      - name: Lines Metrics (Light)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: myst-blazeio
          template: classic
          filename: assets/metrics.lines.light.svg
          config_timezone: Asia/Kolkata
          base: ""
          plugin_lines: yes
          plugin_followup: yes
          plugin_followup_indepth: yes
          # Light: Green accent on White background
          colors: '{"accent": "#32CD32", "header": "#333333", "text": "#333333", "background": "#ffffff"}'
