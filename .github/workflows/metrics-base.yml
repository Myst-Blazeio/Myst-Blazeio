name: Base Metrics
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  base-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Base Metrics (Dark)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: myst-blazeio
          template: classic
          filename: assets/metrics.base.dark.svg
          config_timezone: Asia/Kolkata
          base: "activity, community"
          extras_css: |
            h2, .field { color: #00BFFF !important; }
            svg { background: #0d1117 !important; }

      - name: Base Metrics (Light)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: myst-blazeio
          template: classic
          filename: assets/metrics.base.light.svg
          config_timezone: Asia/Kolkata
          base: "activity, community"
          extras_css: |
            h2, .field { color: #32CD32 !important; }
            svg { background: #ffffff !important; }
