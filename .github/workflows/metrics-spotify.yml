name: Spotify Metrics (Monthly)
on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  spotify-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Top Tracks (Most Played)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: myst-blazeio
          template: classic
          filename: assets/metrics.music.top.svg
          config_timezone: Asia/Kolkata
          base: ""
          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: top
          plugin_music_token: ${{ secrets.SPOTIFY_TOKENS }}
          plugin_music_limit: 5
