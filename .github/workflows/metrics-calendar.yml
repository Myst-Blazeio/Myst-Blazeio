name: Calendar Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  calendar-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Calendar Metrics (Dark)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: myst-blazeio
          template: classic
          filename: assets/metrics.calendar.dark.svg
          config_timezone: Asia/Kolkata
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          # Dark: Blue accent on Black background
          colors: '{"accent": "#00BFFF", "header": "#ffffff", "text": "#c9d1d9", "background": "#0d1117"}'

      - name: Calendar Metrics (Light)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: myst-blazeio
          template: classic
          filename: assets/metrics.calendar.light.svg
          config_timezone: Asia/Kolkata
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          # Light: Green accent on White background
          colors: '{"accent": "#32CD32", "header": "#6db33f", "text": "#333333", "background": "#ffffff"}'
