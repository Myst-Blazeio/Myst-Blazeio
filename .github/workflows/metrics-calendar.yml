name: Calendar Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  calendar-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Calendar Metrics (Dark)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: myst-blazeio
          template: classic
          filename: assets/metrics.calendar.dark.svg
          config_timezone: Asia/Kolkata
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          extras_css: |
            h2, .field { color: #00BFFF !important; }
            svg { background: #0d1117 !important; }

      - name: Calendar Metrics (Light)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: myst-blazeio
          template: classic
          filename: assets/metrics.calendar.light.svg
          config_timezone: Asia/Kolkata
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          extras_css: |
            h2, .field { color: #32CD32 !important; }
            svg { background: #ffffff !important; }
