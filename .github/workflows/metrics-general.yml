name: General Metrics
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  general-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: myst-blazeio
          template: classic
          filename: assets/metrics.general.svg
          config_timezone: Asia/Kolkata
          base: "activity, community, repositories"
          
          # Introduction plugin (No Name)
          plugin_introduction: yes
          plugin_introduction_title: no
          
          # Isometric Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # Lines & Followup
          plugin_lines: yes
          plugin_followup: yes
          plugin_followup_indepth: yes
