name: AniList Metrics (Daily)
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  anilist-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: AniList Metrics (Dark)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: myst-blazeio
          template: classic
          filename: assets/metrics.anilist.dark.svg
          config_timezone: Asia/Kolkata
          base: ""
          plugin_anilist: yes
          plugin_anilist_user: Blazeio
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: favorites, watching, reading
          plugin_anilist_limit: 2
          # Dark: Blue accent on Black background
          colors: '{"accent": "#00BFFF", "header": "#ffffff", "text": "#c9d1d9", "background": "#0d1117"}'

      - name: AniList Metrics (Light)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: myst-blazeio
          template: classic
          filename: assets/metrics.anilist.light.svg
          config_timezone: Asia/Kolkata
          base: ""
          plugin_anilist: yes
          plugin_anilist_user: Blazeio
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: favorites, watching, reading
          plugin_anilist_limit: 2
          # Light: Green accent on White background
          colors: '{"accent": "#32CD32", "header": "#333333", "text": "#333333", "background": "#ffffff"}'
