name: Update Stats Card

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  github-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: myst-blazeio
          template: classic
          filename: assets/stats.svg
          config_timezone: Asia/Kolkata
          config_display: large
          config_output: svg
          config_padding: 6%, 10%
          base: "activity, repositories"
          base_indepth: yes
          extras_css: |
            :root {
              --color-text: #c9d1d9;
              --color-border: #00BFFF;
            }
            svg {
              background: #0d1117;
              border: 1.5px solid #00BFFF;
              border-radius: 15px;
            }
            .header {
              fill: #00BFFF !important;
              font-weight: 700;
            }
            text {
              fill: #c9d1d9;
            }
