name: Intro Metrics
on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  intro-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: myst-blazeio
          template: classic
          filename: assets/metrics.intro.svg
          config_timezone: Asia/Kolkata
          base: ""
          plugin_introduction: yes
          plugin_introduction_title: no
