name: Intro Metrics
on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  intro-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Intro Metrics (Dark)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: myst-blazeio
          template: classic
          filename: assets/metrics.intro.dark.svg
          config_timezone: Asia/Kolkata
          base: header, intro
          base_indepth: yes
          plugin_introduction: yes
          plugin_introduction_title: no
          config_order: base.header, introduction
          # Dark: Blue accent on Black background
          extras_css: |
            h2, .field { color: #00BFFF !important; }
            svg { background: #0d1117 !important; }

      - name: Intro Metrics (Light)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: myst-blazeio
          template: classic
          filename: assets/metrics.intro.light.svg
          config_timezone: Asia/Kolkata
          base: header, intro
          base_indepth: yes
          plugin_introduction: yes
          plugin_introduction_title: no
          config_order: base.header, introduction
          # Light: Green accent on White background
          extras_css: |
            h2, .field { color: #32CD32 !important; }
            svg { background: #ffffff !important; }
